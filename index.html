<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data~v</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-200">

    <canvas id="gridCanvas"></canvas>

    <!-- Header Branding & Navigation -->
    <header class="content-overlay fixed top-0 left-0 w-full p-6 md:p-10 flex justify-between items-center z-50">
        <div class="text-2xl md:text-3xl font-bold tracking-tighter cursor-pointer select-none flex items-center" onclick="showView('home')">
            <span class="text-slate-100">Data~</span>
            <span class="unique-v bg-gradient-to-tr from-emerald-400 via-emerald-300 to-cyan-300 bg-clip-text text-transparent italic ml-0.5 transform -rotate-3 inline-block">
                v
            </span>
        </div>

        <nav class="flex items-center gap-4 md:gap-8">
            <button id="navHome" class="text-sm md:text-base font-medium transition-colors" onclick="showView('home')">
                Home
            </button>
            <button id="navDashboard" class="text-sm md:text-base px-5 py-2 bg-emerald-500/10 border border-emerald-500/20 hover:bg-emerald-500/20 hover:border-emerald-500/40 text-emerald-400 font-semibold rounded-xl transition-all shadow-lg shadow-emerald-500/5" onclick="showView('dashboard')">
                Dashboard
            </button>
        </nav>
    </header>

    <main class="content-overlay min-h-screen flex items-center justify-center p-8 pt-24">
        
        <!-- Home View -->
        <div id="homeView" class="max-w-4xl text-center fade-in-up">
            <h2 class="text-3xl md:text-5xl lg:text-6xl font-bold leading-tight text-slate-100 mb-6">
                A great <span class="gradient-text">Mentor</span> provides the <span class="gradient-text">Spark</span> 
                that ignites a student's potential.
            </h2>
            <div class="w-24 h-1 bg-gradient-to-r from-emerald-500 to-cyan-500 mx-auto mb-8 rounded-full opacity-50"></div>
            <p class="text-xl md:text-2xl text-slate-400 font-medium italic">
                Thank you for being the <span class="text-emerald-400">Light</span> that guided our 
                <span class="text-cyan-400">Path to Success</span>.
            </p>
        </div>

        <!-- Dashboard View -->
        <div id="dashboardView" class="max-w-2xl w-full fade-in-up hidden-view">
            <div class="bg-slate-900/40 backdrop-blur-xl border border-emerald-500/20 rounded-3xl p-6 md:p-10 shadow-2xl">
                <div class="mb-8">
                    <h3 class="text-2xl font-bold text-slate-100 mb-2">Topic Manager</h3>
                    <p class="text-slate-400 text-sm">Select a topic to add data and images.</p>
                </div>

                <div class="flex gap-3 mb-8">
                    <input type="text" id="topicInput" placeholder="New topic name..." 
                        class="flex-1 bg-slate-950/50 border border-slate-700 focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/50 rounded-xl px-4 py-3 outline-none transition-all text-slate-200">
                    <button id="addTopicBtn" class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold px-6 py-3 rounded-xl transition-all transform active:scale-95 shadow-lg shadow-emerald-500/20">
                        Add
                    </button>
                </div>

                <div id="topicList" class="space-y-3 max-h-[45vh] overflow-y-auto pr-2 custom-scroll"></div>
            </div>
        </div>

        <!-- Topic Detail View -->
        <div id="topicDetailView" class="max-w-4xl w-full fade-in-up hidden-view">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="showView('dashboard')" class="p-2 hover:bg-slate-800 rounded-lg text-slate-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </button>
                <h3 id="currentTopicTitle" class="text-3xl font-bold text-slate-100">Topic Name</h3>
                <span id="dataCountBadge" class="ml-auto px-4 py-1 bg-emerald-500/20 text-emerald-400 rounded-full text-sm font-bold border border-emerald-500/30">
                    0 Items
                </span>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Data Entry Form -->
                <div class="md:col-span-1 bg-slate-900/60 backdrop-blur-md border border-slate-800 rounded-2xl p-6 h-fit">
                    <h4 class="text-lg font-semibold mb-4 text-emerald-400">Add Data</h4>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-slate-500 mb-1">Entry Name</label>
                            <input type="text" id="dataNameInput" placeholder="e.g., Spark Cluster" 
                                class="w-full bg-slate-950/50 border border-slate-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-emerald-500/50">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-slate-500 mb-1">Image File</label>
                            <input type="file" id="dataImageInput" accept="image/*"
                                class="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-emerald-500/10 file:text-emerald-400 hover:file:bg-emerald-500/20">
                        </div>
                        <button id="addDataBtn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold py-2 rounded-lg transition-all shadow-lg shadow-emerald-500/10">
                            Upload Data
                        </button>
                    </div>
                </div>

                <!-- Data Display Grid -->
                <div class="md:col-span-2 bg-slate-900/40 backdrop-blur-md border border-emerald-500/10 rounded-2xl p-6 min-h-[400px]">
                    <div id="dataGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- Dynamic items here -->
                    </div>
                    <div id="dataEmptyState" class="flex flex-col items-center justify-center h-full opacity-30 py-20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p>No data added for this topic yet</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Image Modal -->
    <div id="imageModal" class="fixed inset-0 z-[100] bg-slate-950/90 backdrop-blur-sm hidden flex items-center justify-center p-4 transition-opacity duration-300 opacity-0" onclick="closeModal()">
        <img id="modalImage" src="" class="max-w-full max-h-[90vh] rounded-xl shadow-2xl transform scale-95 transition-transform duration-300" onclick="event.stopPropagation()">
        <button class="absolute top-6 right-6 text-slate-400 hover:text-white transition-colors" onclick="closeModal()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    <script src="script.js?v=5"></script>
</body>
</html>
